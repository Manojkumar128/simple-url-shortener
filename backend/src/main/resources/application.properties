spring.application.name=URL Shortener Backend
server.port=8080
server.servlet.context-path=/

# Database Configuration - H2 (for development/testing)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:urlshortenerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.janavani.backend=DEBUG

# Application
app.name=URL Shortener
app.version=1.0.0
